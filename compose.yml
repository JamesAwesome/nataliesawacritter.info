services:
  postgres:
    image: postgres:18.4
    container_name: critter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-critters}
      POSTGRES_USER: ${POSTGRES_USER:-critters}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # postgres:18 images keep PGDATA under /var/lib/postgresql (not .../data)
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-critters} -d ${POSTGRES_DB:-critters}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ./app
    container_name: critter-app
    restart: unless-stopped
    # Defense-in-depth: drop privileges, read-only root FS (pool_monitor convention)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    ports:
      # Host port is configurable (container always listens on 8080). Bound to
      # localhost by default, so the app is reachable on this machine but NOT the
      # LAN. Set APP_BIND=0.0.0.0 to expose it on the LAN. The Cloudflare tunnel
      # reaches the app over the docker network (app:8080) either way.
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-critters}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-critters}
      WRITE_USER: ${WRITE_USER:-}
      WRITE_PASSWORD: ${WRITE_PASSWORD:-}
      TZ: ${TIMEZONE:-America/New_York}
      PHOTOS_DIR: /data/photos
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      SITE_URL: ${SITE_URL:-https://nataliesawacritter.info}
      NTFY_URL: ${NTFY_URL:-}
    volumes:
      - photos:/data/photos
    depends_on:
      postgres:
        condition: service_healthy
    # `/api/health` reports DB connectivity; node 26 has a global fetch. Lets
    # `docker compose up -d --wait` mean "serving + DB-connected", not just
    # "container started" — the signal the deploy job's health gate relies on.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:2026.7.2
    container_name: critter-cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

  # Optional: turns emoji requests into PRs. Off by default; enable with
  # `docker compose --profile sidecar up -d`. Opens PRs, never merges.
  sidecar:
    build:
      context: ./sidecar
    container_name: critter-sidecar
    restart: unless-stopped
    profiles: ["sidecar"]
    environment:
      # Empty → the sidecar refuses to start (deny by default).
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GH_TOKEN: ${GH_TOKEN:-}
      REPO_SLUG: ${REPO_SLUG:-JamesAwesome/nataliesawacritter.info}
      APP_BASE_URL: ${SIDECAR_APP_BASE_URL:-http://app:8080}
      WRITE_USER: ${WRITE_USER:-}
      WRITE_PASSWORD: ${WRITE_PASSWORD:-}
      SIDECAR_MODEL: ${SIDECAR_MODEL:-sonnet}
      POLL_INTERVAL_MS: ${SIDECAR_POLL_INTERVAL_MS:-60000}
      SIDECAR_DRY_RUN: ${SIDECAR_DRY_RUN:-}
      SIDECAR_ALLOWED_COMMENTERS: ${SIDECAR_ALLOWED_COMMENTERS:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SIDECAR_MAX_TURNS: ${SIDECAR_MAX_TURNS:-}
      NTFY_URL: ${NTFY_URL:-}
    volumes:
      - sidecar-repo:/repo
    depends_on:
      - app

volumes:
  pgdata:
  photos:
  sidecar-repo:
