<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Pigeon">
  <!-- feet -->
  <path d="M31 46 v8 M39 46 v8" stroke="#c85f6a" stroke-width="3" stroke-linecap="round"/>
  <path d="M28 54 h7 M36 54 h7" stroke="#c85f6a" stroke-width="2.4" stroke-linecap="round"/>
  <!-- tail -->
  <path d="M51 34 l12 3 -12 6 Z" fill="#8b9299"/>
  <path d="M59 36 l4 1 -4 2 Z" fill="#3a3a3e"/>
  <!-- body -->
  <ellipse cx="37" cy="38" rx="18" ry="12.5" fill="#aab1b8"/>
  <!-- neck: bridges head to body so the head isn't floating -->
  <path d="M12 22 Q9 33 19 41 L29 39 Q32 28 23 23 Q17 19 12 22 Z" fill="#9aa1a8"/>
  <!-- lighter breast over the lower neck/front -->
  <path d="M17 41 Q15 30 26 28 Q21 34 24 42 Q20 45 17 41 Z" fill="#c7cdd2"/>
  <!-- iridescent neck patch -->
  <path d="M18 28 Q24 30 24 39 Q17 40 14 34 Q14 29 18 28 Z" fill="#2f9e8f"/>
  <path d="M19 30 Q23 32 23 39 Q18 39 16 35 Q16 31 19 30 Z" fill="#7a5aa8"/>
  <!-- head -->
  <circle cx="16" cy="18" r="7" fill="#8b9299"/>
  <!-- beak + white cere -->
  <path d="M10 17 l-8 1.5 8 3 Z" fill="#4a4640"/>
  <circle cx="10" cy="16.5" r="1.6" fill="#eceae4"/>
  <!-- eye -->
  <circle cx="17.5" cy="16.5" r="2" fill="#e08a2e"/>
  <circle cx="17.5" cy="16.5" r="0.9" fill="#2a2018"/>
  <!-- two wing bars -->
  <path d="M28 39 h19 M30 44 h16" stroke="#33353a" stroke-width="2.4" stroke-linecap="round"/>
</svg>
